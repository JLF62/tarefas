<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Sala de Prova – Intuitivo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    header {
      background: #004578;
      color: white;
      padding: 0.75rem 1rem;
    }
    main {
      padding: 1rem;
    }
    #mensagem {
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
    }
    #mensagem.erro {
      background: #f8d7da;
      color: #721c24;
      border-color: #f5c6cb;
    }
    #quadro-teste {
      width: 100%;
      height: 80vh;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
      background: #ffffff;
    }
    #quadro-teste iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sala de Prova</h1>
  </header>

  <main>
    <div id="mensagem">
      Este teste deve ser realizado sem sair desta página. 
      Se mudar de aba ou de janela, o teste será automaticamente anulado.
    </div>

    <div id="quadro-teste">
      <!-- SUBSTITUA O SRC PELO LINK DO SEU TESTE INTUITIVO -->
      <iframe 
        id="frame-intuitivo"
        src="https://tests.intuitivo.pt/publication/5f6a77cc-9d91-4301-b275-b4dc08af8a2d">
      </iframe>
    </div>
  </main>

  <script>
    // Estado do teste
    let testeAnulado = false;
    let contagemSaidas = 0;

    const mensagem = document.getElementById('mensagem');
    const quadroTeste = document.getElementById('quadro-teste');
    const frameIntuitivo = document.getElementById('frame-intuitivo');

    function anularTeste(motivo) {
      if (testeAnulado) return;
      testeAnulado = true;

      // Esconde o iframe / impede continuação visual do teste
      quadroTeste.style.display = 'none';

      // Mostra mensagem de anulação
      mensagem.classList.add('erro');
      mensagem.textContent =
        'O teste foi ANULADO porque saiu desta página (' + motivo + '). ' +
        'Informe o professor.';

      // Aqui poderia, se tiver backend, enviar um registo por fetch() com o motivo e hora
      // fetch('/registo', { method: 'POST', body: JSON.stringify({ motivo }) });
    }

    // Detetar perda de foco da aba (mudança de aba, janela, minimizar, etc.)
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'hidden') {
        contagemSaidas += 1;

        // Pode ajustar a tolerância: por exemplo, só anular a partir da 2.ª saída.
        // Aqui, anula logo na 1.ª.
        anularTeste('a aba perdeu visibilidade (mudança de aba/janela)');
      }
    });

    // Opcional: detetar também perda de foco da janela
    window.addEventListener('blur', function () {
      // Se quiser ser mais permissivo, pode comentar esta linha
      // ou usar apenas como contador adicional.
      if (!testeAnulado) {
        contagemSaidas += 1;
        anularTeste('a janela perdeu foco');
      }
    });
  </script>
</body>
</html>
